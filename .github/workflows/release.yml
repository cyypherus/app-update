name: Release

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      tag:
        required: true
        type: string
      app_name:
        required: true
        type: string
      package:
        required: true
        type: string
      binary:
        required: true
        type: string
      project_path:
        required: false
        default: app
        type: string
      windows_icon:
        required: false
        default: ""
        type: string
      platforms:
        required: false
        default: macos-arm,macos-intel,windows-x86_64-gnu
        type: string
    secrets:
      APPLE_CERTIFICATE_BASE64:
        required: true
      APPLE_CERTIFICATE_PASSWORD:
        required: true
      APPLE_TEAM_ID:
        required: true
      APPLE_ID:
        required: true
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true
      VERSION_SERVER_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: macos-14
    environment:
      name: ${{ inputs.environment }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      VERSION_SERVER_API_KEY: ${{ secrets.VERSION_SERVER_API_KEY }}
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      DEPLOY_PROD: ${{ inputs.environment == 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ${{ inputs.project_path }}
          ref: ${{ inputs.tag }}

      - uses: actions/checkout@v4
        with:
          repository: cyypherus/app-update
          path: app-update
          ref: main
          persist-credentials: false

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-dependencies-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-dependencies-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ inputs.project_path }}/target
            app-update/target
          key: cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ inputs.package }}-${{ inputs.environment }}-${{ inputs.tag }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-${{ runner.arch }}-${{ inputs.package }}-${{ inputs.environment }}-
            cargo-target-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache cargo-bundle
        id: cargo-bundle-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-bundle
          key: cargo-bundle-0.9.0-${{ runner.os }}-${{ runner.arch }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-gnu

      - name: Install cross-compile tools
        run: brew install mingw-w64

      - name: Install cargo-bundle
        if: steps.cargo-bundle-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-bundle --version 0.9.0 --locked

      - name: Import signing certificate
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$VERSION_SERVER_API_KEY"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Verify release version
        id: version
        working-directory: ${{ inputs.project_path }}
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ inputs.package }}") | .version')"
          VERSION="${RELEASE_TAG#v}"
          test "$VERSION" = "$PACKAGE_VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and deploy
        run: |
          BUNDLER_ARGS=(
            --project-root "$GITHUB_WORKSPACE/${{ inputs.project_path }}"
            --package "${{ inputs.package }}"
            --binary "${{ inputs.binary }}"
            --app-name "${{ inputs.app_name }}"
          )
          if [ -n "${{ inputs.windows_icon }}" ]; then
            BUNDLER_ARGS+=(--windows-icon "${{ inputs.windows_icon }}")
          fi
          BUNDLER_ARGS+=(--platforms "${{ inputs.platforms }}")
          if [ "$DEPLOY_PROD" = "true" ]; then
            BUNDLER_ARGS+=(--upload-prod)
          fi
          cargo run --release --manifest-path "$GITHUB_WORKSPACE/app-update/app-bundler/Cargo.toml" -- "${BUNDLER_ARGS[@]}"
