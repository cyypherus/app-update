name: Deploy app-update server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Cloudflare environment to deploy
        required: true
        type: choice
        options:
          - dev
          - production
        default: dev

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: app-update-server
          preCommands: ${{ inputs.environment == 'production' && 'd1 migrations apply version-server-d1 --remote --env production' || 'd1 migrations apply version-server-d1 --remote' }}
          command: ${{ inputs.environment == 'production' && 'deploy --env production' || 'deploy' }}
          environment: ${{ inputs.environment == 'production' && 'production' || '' }}
          secrets: |
            API_KEY
        env:
          API_KEY: ${{ secrets.VERSION_SERVER_API_KEY }}
